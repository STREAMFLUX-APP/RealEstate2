<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Streamflux — AI Real Estate Marketing</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Georgia',serif;background:#080808;color:#fff;min-height:100vh}
input,textarea,button,select{font-family:inherit}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#080808}
.logo{font-size:28px;font-weight:700;letter-spacing:3px;color:#fff;margin-bottom:12px}
.logo span{color:#2AB8D4}
.loading-text{color:rgba(255,255,255,0.4);font-size:13px}
.dot{display:inline-block;animation:blink 1.4s infinite both}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
</style>
</head>
<body>
<div id="root">
<div class="loading-screen">
<div class="logo">STREAM<span>FLUX</span></div>
<div class="loading-text">Loading<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></div>
</div>
</div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="app.js"></script>
</body>
</html>
