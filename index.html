const G={bg:"#080808",card:"#111",border:"#222",aqua:"#2AB8D4",aquaDim:"rgba(42,184,212,0.1)",aquaBorder:"rgba(42,184,212,0.25)",gold:"#D4A843",white:"#fff",muted:"rgba(255,255,255,0.5)",green:"#3d9e5c",red:"#ef4444"};

const apiAuth=async(body)=>{try{const r=await fetch("/api/auth",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});return r.json();}catch(e){return{error:e.message};}};
const apiAdmin=async(body)=>{try{const r=await fetch("/api/admin",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});return r.json();}catch(e){return{error:e.message};}};
const apiClaude=async(prompt,system,maxTokens=1000)=>{
const r=await fetch("/api/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt,system,maxTokens})});
const d=await r.json();
if(d.error)throw new Error(d.error);
const t=d.text.trim();
try{return JSON.parse(t);}catch{}
const cm=t.match(/```(?:json)?\s*([\s\S]*?)```/);
if(cm){try{return JSON.parse(cm[1].trim());}catch{}}
const jm=t.match(/\{[\s\S]*\}/);
if(jm){try{return JSON.parse(jm[0]);}catch{}}
throw new Error("Could not parse AI response.");
};

// STATE
let state={screen:"login",user:null,lang:"English"};
const setState=(updates)=>{state={...state,...updates};render();};

// STYLES
const btnStyle=(disabled,color)=>({background:disabled?"#1a1a1a":color||G.aqua,color:disabled?G.muted:"#080808",border:"none",borderRadius:"8px",padding:"13px 24px",fontSize:"14px",fontWeight:"700",cursor:disabled?"not-allowed":"pointer",fontFamily:"inherit",width:"auto",display:"inline-block"});
const inputStyle={width:"100%",background:"#0d0d0d",border:`1px solid ${G.border}`,borderRadius:"8px",color:G.white,fontSize:"14px",padding:"11px 14px",outline:"none",fontFamily:"inherit",boxSizing:"border-box"};
const cardStyle={background:G.card,border:`1px solid ${G.border}`,borderRadius:"14px",padding:"24px",marginBottom:"18px"};
const labelStyle={display:"block",fontSize:"11px",fontWeight:"700",letterSpacing:"0.1em",color:G.muted,textTransform:"uppercase",marginBottom:"4px"};

// HELPERS
function el(tag,attrs,...children){
const e=document.createElement(tag);
if(attrs)Object.entries(attrs).forEach(([k,v])=>{
if(k==="style"&&typeof v==="object")Object.assign(e.style,v);
else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
else if(k==="class")e.className=v;
else e.setAttribute(k,v);
});
children.flat().forEach(c=>{
if(c==null||c===false)return;
e.appendChild(typeof c==="string"?document.createTextNode(c):c);
});
return e;
}

function field(label,type,value,onChange,placeholder,hint){
const wrap=el("div",{style:{marginBottom:"16px"}});
if(label)wrap.appendChild(el("label",{style:labelStyle},label));
if(hint)wrap.appendChild(el("p",{style:{fontSize:"12px",color:"#444",margin:"0 0 5px",fontStyle:"italic"}},hint));
const inp=el("input",{type,placeholder,style:inputStyle});
inp.value=value||"";
inp.addEventListener("input",e=>onChange(e.target.value));
wrap.appendChild(inp);
return wrap;
}

function textarea(label,value,onChange,placeholder,rows,hint){
const wrap=el("div",{style:{marginBottom:"16px"}});
if(label)wrap.appendChild(el("label",{style:labelStyle},label));
if(hint)wrap.appendChild(el("p",{style:{fontSize:"12px",color:"#444",margin:"0 0 5px",fontStyle:"italic"}},hint));
const ta=el("textarea",{placeholder,rows:rows||3,style:{...inputStyle,resize:"vertical"}});
ta.value=value||"";
ta.addEventListener("input",e=>onChange(e.target.value));
wrap.appendChild(ta);
return wrap;
}

function chips(label,hint,options,selected,onToggle,single){
const wrap=el("div",{style:{marginBottom:"20px"}});
if(label)wrap.appendChild(el("label",{style:labelStyle},label));
if(hint)wrap.appendChild(el("p",{style:{fontSize:"12px",color:"#444",margin:"0 0 7px",fontStyle:"italic"}},hint));
const grid=el("div",{style:{display:"flex",flexWrap:"wrap",gap:"7px"}});
options.forEach(opt=>{
const val=typeof opt==="string"?opt:opt.value;
const lbl=typeof opt==="string"?opt:opt.label;
const sub=typeof opt==="object"?opt.desc:null;
const active=single?selected===val:(selected||[]).includes(val);
const btn=el("button",{style:{background:active?"#0f2a0f":"#0d0d0d",border:`1px solid ${active?G.green:G.border}`,borderRadius:"7px",color:active?"#6ee7a0":"#888",fontSize:"12px",padding:sub?"9px 13px":"7px 12px",cursor:"pointer",fontFamily:"inherit",textAlign:"left"}},
el("div",{style:{fontWeight:active?"700":"400"}},lbl),
...(sub?[el("div",{style:{fontSize:"11px",color:active?"#4ade80":G.muted,marginTop:"2px"}},sub)]:[])
);
btn.addEventListener("click",()=>onToggle(val));
grid.appendChild(btn);
});
wrap.appendChild(grid);
return wrap;
}

function copyCard(title,content,icon,accentColor){
accentColor=accentColor||G.aqua;
const card=el("div",{style:{background:"#0d0d0d",border:`1px solid ${G.border}`,borderRadius:"10px",padding:"15px 17px",marginBottom:"12px"}});
let copied=false;
const copyBtn=el("button",{style:{background:"#161616",border:`1px solid ${G.border}`,borderRadius:"6px",color:"#666",fontSize:"11px",padding:"4px 11px",cursor:"pointer",fontFamily:"inherit",flexShrink:"0"}},"Copy");
copyBtn.addEventListener("click",()=>{
navigator.clipboard.writeText(content||"");
copyBtn.textContent="✓ Copied";
copyBtn.style.color="#4caf50";
copyBtn.style.borderColor="#2a5a2a";
setTimeout(()=>{copyBtn.textContent="Copy";copyBtn.style.color="#666";copyBtn.style.borderColor=G.border;},1800);
});
card.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}},
el("span",{style:{fontSize:"11px",fontWeight:"700",letterSpacing:"0.1em",color:accentColor,textTransform:"uppercase"}},`${icon} ${title}`),
copyBtn
));
card.appendChild(el("p",{style:{color:"#ccc",fontSize:"14px",lineHeight:"1.75",margin:"0",whiteSpace:"pre-wrap"}},content||""));
return card;
}

function renderLogin(){
let email="",password="",loading=false,error="";

function buildLogin(){
const g=GL[state.lang]||GL.English;
const wrap=el("div",{style:{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px",background:G.bg}});
const inner=el("div",{style:{width:"100%",maxWidth:"420px"}});

// Language selector at top
const langRow=el("div",{style:{display:"flex",justifyContent:"center",gap:"8px",marginBottom:"28px"}});
LANGS.forEach(l=>{
const btn=el("button",{style:{background:state.lang===l.value?G.aqua:"transparent",color:state.lang===l.value?"#080808":G.muted,border:`1px solid ${state.lang===l.value?G.aqua:G.border}`,borderRadius:"100px",padding:"6px 16px",fontSize:"13px",fontWeight:"600",cursor:"pointer",fontFamily:"inherit"}},l.label);
btn.addEventListener("click",()=>{state.lang=l.value;document.getElementById("root").innerHTML="";document.getElementById("root").appendChild(buildLogin());});
langRow.appendChild(btn);
});
inner.appendChild(langRow);

inner.appendChild(el("div",{style:{textAlign:"center",marginBottom:"32px"}},
el("div",{style:{fontSize:"28px",fontWeight:"700",letterSpacing:"3px",color:G.white,marginBottom:"8px"}},"STREAM",el("span",{style:{color:G.aqua}},"FLUX")),
el("p",{style:{color:G.muted,fontSize:"14px"}},g.tagline)
));

const card=el("div",{style:cardStyle});
card.appendChild(el("h2",{style:{fontSize:"18px",fontWeight:"700",marginBottom:"20px",color:G.white}},g.signIn));

const emailWrap=el("div",{style:{marginBottom:"16px"}});
emailWrap.appendChild(el("label",{style:labelStyle},g.emailLabel));
const emailInp=el("input",{type:"email",placeholder:"your@email.com",style:inputStyle});
emailInp.value=email;
emailInp.addEventListener("input",e=>email=e.target.value);
emailWrap.appendChild(emailInp);
card.appendChild(emailWrap);

const passWrap=el("div",{style:{marginBottom:"16px"}});
passWrap.appendChild(el("label",{style:labelStyle},g.passLabel));
const passInp=el("input",{type:"password",placeholder:"••••••••",style:inputStyle});
passInp.value=password;
passInp.addEventListener("input",e=>password=e.target.value);
passWrap.appendChild(passInp);
card.appendChild(passWrap);

const errDiv=el("div",{style:{background:"#1a0808",border:"1px solid #3a1010",borderRadius:"8px",padding:"10px 14px",color:"#f87171",fontSize:"13px",marginBottom:"14px",display:error?"block":"none"}},error?`⚠ ${error}`:"");
card.appendChild(errDiv);

const loginBtn=el("button",{style:{...btnStyle(loading),width:"100%",fontSize:"15px"}},loading?g.signingIn:g.signInBtn);
loginBtn.addEventListener("click",async()=>{
if(!email||!password){error=g.emailLabel+" and "+g.passLabel+" required";document.getElementById("root").innerHTML="";document.getElementById("root").appendChild(buildLogin());return;}
loading=true;error="";document.getElementById("root").innerHTML="";document.getElementById("root").appendChild(buildLogin());
const res=await apiAuth({action:"login",email,password});
loading=false;
if(res.success){localStorage.setItem("sf_user",JSON.stringify(res.user));setState({screen:"dashboard",user:res.user});}
else{error=res.error||"Login failed.";document.getElementById("root").innerHTML="";document.getElementById("root").appendChild(buildLogin());}
});
card.appendChild(loginBtn);
card.appendChild(el("p",{style:{textAlign:"center",color:G.muted,fontSize:"12px",marginTop:"16px"}},g.noAccount," ",el("span",{style:{color:G.aqua}},"francisco@streamflux.app")));
inner.appendChild(card);
wrap.appendChild(inner);
return wrap;
}
return buildLogin();
}

// STORAGE HELPERS
const SF={
getListings:()=>{try{return JSON.parse(localStorage.getItem("sf_listings")||"[]");}catch{return[];}},
saveListings:(arr)=>localStorage.setItem("sf_listings",JSON.stringify(arr.slice(0,5))),
getClients:()=>{try{return JSON.parse(localStorage.getItem("sf_clients")||"[]");}catch{return[];}},
saveClients:(arr)=>localStorage.setItem("sf_clients",JSON.stringify(arr.slice(0,10))),
addListing:(listing)=>{const arr=SF.getListings();arr.unshift({...listing,id:Date.now(),savedAt:new Date().toLocaleDateString()});SF.saveListings(arr);},
addClient:(client)=>{const arr=SF.getClients();arr.unshift({...client,id:Date.now(),savedAt:new Date().toLocaleDateString()});SF.saveClients(arr);},
};

// DASHBOARD
function renderDashboard(){

const g=GL[state.lang]||GL.English;
const hasApp1=user.plan==="marketing"||user.plan==="bundle";
const hasApp2=user.plan==="outreach"||user.plan==="bundle";
const listings=SF.getListings();
const clients=SF.getClients();
const followUpsDue=clients.filter(c=>{
if(!c.savedAt)return false;
const d=new Date(c.savedAt);
const diff=Math.ceil((Date.now()-d)/(1000*60*60*24));
return diff>=3&&diff<=30;
}).length;

const wrap=el("div",{style:{minHeight:"100vh",background:G.bg}});

// Nav
const nav=el("div",{style:{background:G.card,borderBottom:`1px solid ${G.border}`,padding:"16px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"10px"}});

logoutBtn.addEventListener("click",()=>{localStorage.removeItem("sf_user");setState({screen:"login",user:null});});
navRight.appendChild(logoutBtn);
nav.appendChild(navRight);

// Pipeline stats

[[`🏠`,listings.length,g.activeListings,G.aqua],[`🤝`,clients.length,g.clientsPipeline,G.gold],[`🔔`,followUpsDue,g.followUpsDue,"#f87171"],[`⚡`,listings.length+clients.length,g.totalGenerated,"#2AB8D4"]].forEach(([icon,num,label,color])=>{
const c=el("div",{style:{background:G.card,border:`1px solid ${G.border}`,borderRadius:"10px",padding:"16px 18px"}});

content.appendChild(statsRow);

el("div",{style:{fontSize:"12px",color:G.muted}},"Complete listing package in 30 seconds")

wrap.appendChild(content);
return wrap;

const card=el("div",{style:cardStyle});

if(s.step===1){

const langSel=el("select",{style:{...inputStyle,cursor:"pointer",marginBottom:"20px"}});
LANGUAGES.forEach(l=>{const o=el("option",{value:l.value},l.label);if(l.value===s.language)o.selected=true;langSel.appendChild(o);});
langSel.addEventListener("change",e=>{s.language=e.target.value;renderApp1Content();});
card.appendChild(langSel);
card.appendChild(el("h2",{style:{fontSize:"17px",fontWeight:"700",marginBottom:"4px",color:G.white}},t.whatMarketing));
card.appendChild(chips(null,null,MODES,s.mode,v=>{s.mode=v;renderApp1Content();},true));
}

if(s.step===2){
card.appendChild(el("h2",{style:{fontSize:"17px",fontWeight:"700",marginBottom:"16px",color:G.white}},t.propBasics));
// CUSTOM CONTEXT BOX
const ctxBox=el("div",{style:{background:"rgba(42,184,212,0.08)",border:"1.5px solid rgba(42,184,212,0.4)",borderRadius:"10px",padding:"16px",marginBottom:"20px"}});

ctxBox.appendChild(el("p",{style:{fontSize:"12px",color:"rgba(42,184,212,0.85)",marginBottom:"10px",lineHeight:"1.6"}},t.customBoxHint));
const ctxTa=el("textarea",{placeholder:t.customBoxPlaceholder,rows:4,style:{...inputStyle,resize:"vertical",borderColor:"rgba(42,184,212,0.4)",background:"#0d0d0d"}});

ctxTa.addEventListener("input",e=>s.customContext=e.target.value);

card.appendChild(chips(t2form.propType,null,PROP_TYPES,s.propType,v=>{s.propType=v;renderApp1Content();},true));
card.appendChild(field("Full Address","text",s.address,v=>s.address=v,"123 Ocean Drive, Miami Beach, FL 33139"));
if(s.mode==="price_reduction"){
const g=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}});
g.appendChild(field("New Price ($)","text",s.price,v=>s.price=v,"895,000"));
g.appendChild(field("Original Price ($)","text",s.oldPrice,v=>s.oldPrice=v,"995,000"));
card.appendChild(g);
}else if(s.mode==="sold"){
const g=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}});
g.appendChild(field("List Price ($)","text",s.price,v=>s.price=v,"995,000"));
g.appendChild(field("Sold Price ($)","text",s.soldPrice,v=>s.soldPrice=v,"980,000"));
g.appendChild(field("Days on Market","number",s.daysOnMarket,v=>s.daysOnMarket=v,"12"));
card.appendChild(g);
}else{
card.appendChild(field(t2form.propPrice,"text",s.price,v=>s.price=v,"1,250,000"));
}
if(s.mode!=="sold"){
const g=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}});
g.appendChild(field("Bedrooms","number",s.beds,v=>s.beds=v,"4"));
g.appendChild(field("Bathrooms","number",s.baths,v=>s.baths=v,"3"));
g.appendChild(field("Size (sq ft)","text",s.sqft,v=>s.sqft=v,"2,400"));
g.appendChild(field("Year Built","text",s.yearBuilt,v=>s.yearBuilt=v,"2019"));
card.appendChild(g);
}
if(s.mode==="open_house"){
const g=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}});
g.appendChild(field("Open House Date","text",s.openHouseDate,v=>s.openHouseDate=v,"Saturday, June 14"));
g.appendChild(field("Open House Time","text",s.openHouseTime,v=>s.openHouseTime=v,"1:00 PM – 4:00 PM"));
card.appendChild(g);
}
card.appendChild(chips("Condition",null,CONDITIONS,s.condition,v=>{s.condition=v;renderApp1Content();},true));
const g2=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}});
g2.appendChild(field("Agent Name","text",s.agentName,v=>s.agentName=v,"James Rivera"));
g2.appendChild(field("Agent Phone","text",s.agentPhone,v=>s.agentPhone=v,"+1 305 555 0199"));
card.appendChild(g2);
}

if(s.step===3){
card.appendChild(el("h2",{style:{fontSize:"17px",fontWeight:"700",marginBottom:"16px",color:G.white}},t.location));
card.appendChild(field("City","text",s.city,v=>s.city=v,"Miami, Dubai, London..."));
card.appendChild(field("Neighbourhood","text",s.neighbourhood,v=>s.neighbourhood=v,"South Beach, Beverly Hills..."));
card.appendChild(chips("Location Features",null,LOCATION_FEATS,s.locationFeatures,v=>{s.locationFeatures=tog(s.locationFeatures,v);renderApp1Content();}));
card.appendChild(field("Commute & Transport","text",s.commute,v=>s.commute=v,"2 blocks to metro, 20 min to downtown"));
}

if(s.step===4&&s.mode!=="sold"){
card.appendChild(el("h2",{style:{fontSize:"17px",fontWeight:"700",marginBottom:"16px",color:G.white}},t.features));
card.appendChild(chips("Interior Features",null,INTERIOR,s.interior,v=>{s.interior=tog(s.interior,v);renderApp1Content();}));
card.appendChild(chips("Outdoor Features",null,OUTDOOR,s.outdoor,v=>{s.outdoor=tog(s.outdoor,v);renderApp1Content();}));
card.appendChild(chips("Building Amenities",null,BUILDING,s.building,v=>{s.building=tog(s.building,v);renderApp1Content();}));
}

if(s.step===5&&s.mode!=="sold"&&s.mode!=="open_house"){
card.appendChild(el("h2",{style:{fontSize:"17px",fontWeight:"700",marginBottom:"16px",color:G.white}},t.standout));
card.appendChild(textarea("The #1 Unique Feature",s.uniqueFeature,v=>s.uniqueFeature=v,"e.g. A 40-foot private boat dock with direct ocean access and unobstructed sunset views",3,"Be vivid and specific"));
card.appendChild(textarea("Additional Notes",s.agentNote,v=>s.agentNote=v,"e.g. Fully renovated 2024. Motivated seller.",2));
}

if((s.step===totalSteps())||(s.step===4&&s.mode==="sold")||(s.step===5&&s.mode==="open_house")){

}

if(s.loading){
const loadCard=el("div",{style:{background:G.card,border:`1px solid ${G.border}`,borderRadius:"10px",padding:"16px 20px",marginBottom:"16px"}});
loadCard.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"8px"}},el("p",{style:{color:G.gold,fontSize:"13px",margin:"0",fontWeight:"600"}},s.loadingMsg),el("span",{style:{color:G.muted,fontSize:"12px"}},`${s.loadingPct}%`)));
const bar=el("div",{style:{width:"100%",height:"4px",background:G.border,borderRadius:"2px"}});
bar.appendChild(el("div",{style:{width:`${s.loadingPct}%`,height:"100%",background:G.gold,borderRadius:"2px",transition:"width 0.5s ease"}}));
loadCard.appendChild(bar);
content.appendChild(loadCard);
}

const btnRow=el("div",{style:{display:"flex",justifyContent:"space-between"}});
const backB=el("button",{style:{background:"transparent",color:G.muted,border:`1px solid ${G.border}`,borderRadius:"10px",padding:"14px 22px",fontSize:"14px",fontFamily:"inherit",cursor:"pointer"}},t.back2);
backB.addEventListener("click",()=>{s.error="";if(s.step>1)s.step--;else setState({screen:"dashboard"});renderApp1Content();});
btnRow.appendChild(backB);
if(s.step<totalSteps()){
const nextB=el("button",{style:btnStyle(!canProceed())},t.continue);
nextB.addEventListener("click",()=>{if(canProceed()){s.error="";s.step++;renderApp1Content();}else{s.error=t.fillRequired;renderApp1Content();}});
btnRow.appendChild(nextB);
}else{
const genB=el("button",{style:{...btnStyle(!canProceed()||s.loading),minWidth:"200px"}},s.loading?t.generating:t.generate);
genB.addEventListener("click",()=>{if(canProceed()&&!s.loading)generate();});
btnRow.appendChild(genB);
}
content.appendChild(btnRow);
wrap.appendChild(content);
}

renderApp1Content();
return wrap;
}

propCard.appendChild(field(t2form.propAddress,"text",s.propAddress,v=>s.propAddress=v,"42 Palm Drive, Miami Beach, FL 33139"));
const pg=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}});
pg.appendChild(field(t2form.propPrice,"text",s.propPrice,v=>s.propPrice=v,"1,100,000"));
pg.appendChild(field(t2form.propType,"text",s.propType,v=>s.propType=v,"4-bed villa with pool"));
propCard.appendChild(pg);
propCard.appendChild(textarea(t2form.propHighlights,s.propHighlights,v=>s.propHighlights=v,"Ocean views, private pool, just reduced by $50K",2,t2form.propHighlightsHint));
content.appendChild(propCard);

if(isMatcher()){
const matchCard=el("div",{style:cardStyle});
matchCard.appendChild(el("h2",{style:{fontSize:"17px",fontWeight:"700",marginBottom:"16px",color:G.white}},t2form.matcherTitle));
matchCard.appendChild(el("p",{style:{color:G.muted,fontSize:"13px",marginBottom:"16px"}},t2form.matcherHint));
matchCard.appendChild(textarea(t2form.buyerNeeds,s.buyerNeeds,v=>s.buyerNeeds=v,"4 beds, pool, good schools, under $1.5M, prefers South Beach",2));
s.matcherProps.forEach((p,i)=>{
const pCard=el("div",{style:{background:"#0d0d0d",border:`1px solid ${G.border}`,borderRadius:"10px",padding:"16px",marginBottom:"12px"}});
pCard.appendChild(el("p",{style:{fontSize:"11px",fontWeight:"700",color:G.gold,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:"12px"}},`${t2form.optionLabel} ${i+1}`));
const pg2=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}});
pg2.appendChild(field("Address","text",p.address,v=>{s.matcherProps[i].address=v;},"123 Main St, Miami"));
pg2.appendChild(field("Price ($)","text",p.price,v=>{s.matcherProps[i].price=v;},"1,200,000"));
pCard.appendChild(pg2);
pCard.appendChild(field(t2form.propType,"text",p.type,v=>{s.matcherProps[i].type=v;},"4-bed house with pool"));
pCard.appendChild(field(t2form.propHighlights,"text",p.highlights,v=>{s.matcherProps[i].highlights=v;},"Ocean view, renovated kitchen, top school district"));
matchCard.appendChild(pCard);
});
content.appendChild(matchCard);
}

if(isBuyer()&&!isMatcher()){
const buyCard=el("div",{style:cardStyle});
buyCard.appendChild(el("h2",{style:{fontSize:"17px",fontWeight:"700",marginBottom:"16px",color:G.white}},t2form.buyerTitle));
buyCard.appendChild(chips(null,null,BUYER_CRITERIA,s.buyerCriteria,v=>{s.buyerCriteria=tog(s.buyerCriteria,v);renderApp2Content();}));
content.appendChild(buyCard);
}

if(isSeller()){
const sellCard=el("div",{style:cardStyle});
sellCard.appendChild(el("h2",{style:{fontSize:"17px",fontWeight:"700",marginBottom:"16px",color:G.white}},t2form.sellerTitle));
sellCard.appendChild(chips(null,null,SELLER_SITUATION,s.sellerSituation,v=>{s.sellerSituation=tog(s.sellerSituation,v);renderApp2Content();}));
content.appendChild(sellCard);
}

const ctxCard=el("div",{style:cardStyle});
ctxCard.appendChild(el("h2",{style:{fontSize:"17px",fontWeight:"700",marginBottom:"16px",color:G.white}},t2form.contextTitle));
ctxCard.appendChild(textarea(t2form.priorLabel,s.priorContact,v=>s.priorContact=v,t2form.priorPlaceholder,2,t2form.priorHint));
ctxCard.appendChild(textarea(t2form.noteLabel,s.personalNote,v=>s.personalNote=v,t2form.notePlaceholder,2,t2form.noteHint));
content.appendChild(ctxCard);

const agentCard=el("div",{style:cardStyle});
agentCard.appendChild(el("h2",{style:{fontSize:"17px",fontWeight:"700",marginBottom:"16px",color:G.white}},t2form.agentTitle));
const ag=el("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}});
ag.appendChild(field(t2form.agentName,"text",s.agentName,v=>s.agentName=v,"James Rivera"));
ag.appendChild(field(t2form.agentPhone,"text",s.agentPhone,v=>s.agentPhone=v,"+1 305 555 0199"));
agentCard.appendChild(ag);
agentCard.appendChild(field(t2form.agencyName,"text",s.agencyName,v=>s.agencyName=v,"Rivera Real Estate Group"));
content.appendChild(agentCard);

if(s.error)content.appendChild(el("div",{style:{background:"#1a0808",border:"1px solid #3a1010",borderRadius:"8px",padding:"12px 16px",color:"#f87171",fontSize:"13px",marginBottom:"16px",fontFamily:"monospace"}},`⚠ ${s.error}`));

if(s.loading){
const lc=el("div",{style:{background:G.card,border:`1px solid ${G.border}`,borderRadius:"10px",padding:"18px 22px",marginBottom:"16px",textAlign:"center"}});
lc.appendChild(el("p",{style:{color:G.aqua,fontSize:"14px",margin:"0",fontWeight:"600"}},s.loadingMsg));
lc.appendChild(el("p",{style:{color:G.muted,fontSize:"12px",margin:"6px 0 0"}},isSpa?"Generando en español. Por favor espera...":"Generating. Please wait..."));
content.appendChild(lc);
}

const genBtn=el("button",{style:{...btnStyle(!canGenerate()||s.loading),width:"100%",fontSize:"15px"}},t2form.loading?t2form.generating:t2form.generate);
genBtn.addEventListener("click",()=>{if(canGenerate()&&!s.loading)generate();});
content.appendChild(genBtn);
if(!canGenerate())content.appendChild(el("p",{style:{color:G.muted,fontSize:"12px",marginTop:"8px",textAlign:"center"}},(T2[s.language]||T2.English).fillRequired));

wrap.appendChild(content);
}

renderApp2Content();
return wrap;
}

function render(){
const root=document.getElementById("root");
root.innerHTML="";
if(state.screen==="login")root.appendChild(renderLogin());
else if(state.screen==="dashboard")root.appendChild(renderDashboard());
else if(state.screen==="admin")root.appendChild(renderAdmin());
else if(state.screen==="app1")root.appendChild(renderApp1());
else if(state.screen==="app2")root.appendChild(renderApp2());
}

// CHECK SESSION ON LOAD
const saved=localStorage.getItem("sf_user");
if(saved){
const u=JSON.parse(saved);
apiAuth({action:"check",userId:u.id}).then(res=>{
if(res.success){state.screen="dashboard";state.user=res.user;render();}
else{localStorage.removeItem("sf_user");render();}
}).catch(()=>render());
}else{render();}
</script>
</body>
</html>
