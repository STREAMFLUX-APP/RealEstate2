// ── API HELPERS ──────────────────────────────────────────────────────────────
const apiAuth = async (body) => {
const r = await fetch("/api/auth", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });
return r.json();
};

const apiClaude = async (prompt, system, maxTokens=1000) => {
const r = await fetch("/api/claude", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({prompt,system,maxTokens}) });
const d = await r.json();
if(d.error) throw new Error(d.error);
const text = d.text.trim();
try { return JSON.parse(text); } catch{}
const cm = text.match(/```(?:json)?\s*([\s\S]*?)```/);
if(cm) { try { return JSON.parse(cm[1].trim()); } catch{} }
const jm = text.match(/\{[\s\S]*\}/);
if(jm) { try { return JSON.parse(jm[0]); } catch{} }
throw new Error("Could not parse AI response. Please try again.");
};

const apiAdmin = async (body) => {
const r = await fetch("/api/admin", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body) });

</div>)}
</div>)}
</>}
</div>
</div>;

return <div style={{background:G.bg,minHeight:"100vh"}}>

{matcherProps.map((p,i)=><div key={i} style={{background:"#0d0d0d",border:`1px solid ${G.border}`,borderRadius:10,padding:16,marginBottom:12}}>
<p style={{fontSize:11,fontWeight:700,color:G.gold,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:12}}>Option {i+1}</p>

// ── ADMIN PANEL ──────────────────────────────────────────────────────────────
function AdminPanel({onBack}) {
const [adminKey,setAdminKey]=useState("");
const [authed,setAuthed]=useState(false);
const [users,setUsers]=useState([]);
const [loading,setLoading]=useState(false);
const [msg,setMsg]=useState("");
const [name,setName]=useState("");
const [email,setEmail]=useState("");
const [password,setPassword]=useState("");
const [plan,setPlan]=useState("bundle");
const [trialDays,setTrialDays]=useState("7");

const loadUsers=async(key)=>{
setLoading(true);
const res=await apiAdmin({adminKey:key,action:"list_users"});
setLoading(false);
if(res.success) setUsers(res.users);
else setMsg("❌ "+res.error);
};

const auth=async()=>{
setLoading(true);
const res=await apiAdmin({adminKey,action:"list_users"});
setLoading(false);
if(res.success){setAuthed(true);setUsers(res.users);}
else setMsg("❌ Wrong admin key");
};

const addUser=async()=>{
if(!name||!email||!password){setMsg("Fill in all fields.");return;}
setLoading(true);
const res=await apiAdmin({adminKey,action:"add_user",name,email,password,plan,trialDays:parseInt(trialDays)});
setLoading(false);
if(res.success){setMsg("✅ User added: "+res.user.email);setName("");setEmail("");setPassword("");loadUsers(adminKey);}
else setMsg("❌ "+res.error);
};

const deactivate=async(userId,userName)=>{
if(!confirm(`Deactivate ${userName}?`)) return;
await apiAdmin({adminKey,action:"deactivate_user",userId});
setMsg("✅ Deactivated.");
loadUsers(adminKey);
};

const activate=async(userId)=>{
await apiAdmin({adminKey,action:"activate_user",userId});
setMsg("✅ Activated.");
loadUsers(adminKey);
};

const markSubscribed=async(userId)=>{
await apiAdmin({adminKey,action:"subscribe_user",userId});
setMsg("✅ Marked as subscribed.");
loadUsers(adminKey);
};

const card={background:G.card,border:`1px solid ${G.border}`,borderRadius:14,padding:24,marginBottom:18};

if(!authed) return <div style={{background:G.bg,minHeight:"100vh",padding:24}}>
<div style={{maxWidth:420,margin:"60px auto"}}>
<GhostBtn onClick={onBack} style={{marginBottom:24,fontSize:12}}>← Back</GhostBtn>
<div style={card}>
<h2 style={{fontSize:18,fontWeight:700,marginBottom:16,color:G.white}}>⚙️ Admin Panel</h2>
<Input label="Admin Secret Key" type="password" value={adminKey} onChange={setAdminKey} placeholder="Your admin secret key"/>
{msg&&<p style={{color:"#f87171",fontSize:13,marginBottom:12,fontFamily:"monospace"}}>{msg}</p>}
<Btn onClick={auth} disabled={loading} style={{width:"100%"}}>{loading?"Checking...":"Access Admin Panel →"}</Btn>
</div>
</div>
</div>;

return <div style={{background:G.bg,minHeight:"100vh"}}>
<div style={{background:G.card,borderBottom:`1px solid ${G.border}`,padding:"14px 24px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<span style={{fontSize:15,fontWeight:700}}>⚙️ Streamflux Admin Panel</span>
<GhostBtn onClick={onBack} style={{fontSize:12,padding:"6px 14px"}}>← Dashboard</GhostBtn>
</div>
<div style={{maxWidth:900,margin:"0 auto",padding:"32px 20px 60px"}}>
{msg&&<div style={{background:"#0a1f0a",border:`1px solid ${G.green}`,borderRadius:8,padding:"10px 14px",color:"#4ade80",fontSize:13,marginBottom:16,fontFamily:"monospace"}}>{msg}</div>}

{/* Add user */}
<div style={card}>
<h3 style={{fontSize:16,fontWeight:700,color:G.white,marginBottom:16}}>➕ Add New Client</h3>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
<Input label="Full Name" value={name} onChange={setName} placeholder="Sarah Johnson"/>
<Input label="Email" type="email" value={email} onChange={setEmail} placeholder="sarah@email.com"/>
<Input label="Password" value={password} onChange={setPassword} placeholder="Welcome2024!"/>
<Input label="Trial Days" type="number" value={trialDays} onChange={setTrialDays} placeholder="7"/>
</div>
<div style={{marginBottom:16}}>
<label style={{display:"block",fontSize:11,fontWeight:700,letterSpacing:"0.1em",color:G.muted,textTransform:"uppercase",marginBottom:6}}>Plan</label>
<select value={plan} onChange={e=>setPlan(e.target.value)} style={{width:"100%",background:"#0d0d0d",border:`1px solid ${G.border}`,borderRadius:8,color:G.white,fontSize:14,padding:"11px 14px",cursor:"pointer"}}>
<option value="marketing">Marketing Tool — $125/mo (App 1 only)</option>
<option value="outreach">Outreach Tool — $125/mo (App 2 only)</option>
<option value="bundle">Complete Bundle — $157/mo (Both Apps)</option>
</select>
</div>
<Btn onClick={addUser} disabled={loading}>{loading?"Adding...":"Add Client →"}</Btn>
</div>

{/* Users list */}
<div style={card}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
<h3 style={{fontSize:16,fontWeight:700,color:G.white}}>👥 All Clients ({users.length})</h3>
<GhostBtn onClick={()=>loadUsers(adminKey)} style={{fontSize:12,padding:"6px 12px"}}>Refresh</GhostBtn>
</div>
{users.length===0?<p style={{color:G.muted,fontSize:14}}>No clients yet.</p>:users.map(u=>{
const trial=new Date(u.trial_ends_at);
const now=new Date();
const trialActive=now<trial;
const daysLeft=trialActive?Math.ceil((trial-now)/(1000*60*60*24)):0;
return <div key={u.id} style={{background:"#0d0d0d",border:`1px solid ${G.border}`,borderRadius:10,padding:"14px 16px",marginBottom:10}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
<div>
<div style={{fontWeight:700,color:G.white,fontSize:14}}>{u.name}</div>
<div style={{color:G.muted,fontSize:12,marginTop:2}}>{u.email}</div>
<div style={{display:"flex",gap:8,marginTop:6,flexWrap:"wrap"}}>
<span style={{fontSize:11,background:G.aquaDim,border:`1px solid ${G.aquaBorder}`,borderRadius:100,padding:"2px 10px",color:G.aqua,fontWeight:600}}>{u.plan==="bundle"?"Bundle":u.plan==="marketing"?"Marketing":"Outreach"}</span>
{u.subscribed&&<span style={{fontSize:11,background:"rgba(61,158,92,0.1)",border:"1px solid rgba(61,158,92,0.3)",borderRadius:100,padding:"2px 10px",color:"#4ade80",fontWeight:600}}>✓ Subscribed</span>}
{trialActive&&!u.subscribed&&<span style={{fontSize:11,background:"rgba(212,168,67,0.1)",border:"1px solid rgba(212,168,67,0.3)",borderRadius:100,padding:"2px 10px",color:G.gold,fontWeight:600}}>Trial: {daysLeft}d left</span>}
{!trialActive&&!u.subscribed&&<span style={{fontSize:11,background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:100,padding:"2px 10px",color:G.red,fontWeight:600}}>Trial Expired</span>}
{!u.active&&<span style={{fontSize:11,background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:100,padding:"2px 10px",color:G.red,fontWeight:600}}>Deactivated</span>}
</div>
</div>
<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
{!u.subscribed&&<GhostBtn onClick={()=>markSubscribed(u.id)} style={{fontSize:11,padding:"5px 12px",color:G.green,borderColor:G.green}}>Mark Paid</GhostBtn>}
{u.active?<GhostBtn onClick={()=>deactivate(u.id,u.name)} style={{fontSize:11,padding:"5px 12px",color:G.red,borderColor:G.red}}>Deactivate</GhostBtn>:<GhostBtn onClick={()=>activate(u.id)} style={{fontSize:11,padding:"5px 12px",color:G.green,borderColor:G.green}}>Activate</GhostBtn>}
</div>
</div>
</div>;
})}
</div>
</div>
</div>;
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
const [user,setUser]=useState(null);
const [screen,setScreen]=useState("login");

useEffect(()=>{
const saved=localStorage.getItem("sf_user");
if(saved){
const u=JSON.parse(saved);
apiAuth({action:"check",userId:u.id}).then(res=>{
if(res.success){setUser(res.user);setScreen("dashboard");}
else localStorage.removeItem("sf_user");
});
}
},[]);

const handleLogin=(u)=>{localStorage.setItem("sf_user",JSON.stringify(u));setUser(u);setScreen("dashboard");};
const handleLogout=()=>{localStorage.removeItem("sf_user");setUser(null);setScreen("login");};

if(screen==="login") return <LoginScreen onLogin={handleLogin}/>;
if(screen==="dashboard") return <Dashboard user={user} onSelectApp={app=>setScreen(app)} onLogout={handleLogout} onAdmin={()=>setScreen("admin")}/>;
if(screen==="app1") return <App1 onBack={()=>setScreen("dashboard")}/>;
if(screen==="app2") return <App2 onBack={()=>setScreen("dashboard")}/>;
if(screen==="admin") return <AdminPanel onBack={()=>setScreen("dashboard")}/>;
return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
